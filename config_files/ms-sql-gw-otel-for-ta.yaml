# Default configuration file for the Linux (deb/rpm) and Windows MSI collector packages

# If the collector is installed without the Linux/Windows installer script, the following
# environment variables are required to be manually defined or configured below:
# - SPLUNK_ACCESS_TOKEN: The Splunk access token to authenticate requests
# - SPLUNK_API_URL: The Splunk API URL, e.g. https://api.us0.observability.splunkcloud.com
# - SPLUNK_HEC_TOKEN: The Splunk HEC authentication token
# - SPLUNK_HEC_URL: The Splunk HEC endpoint URL, e.g. https://http-inputs-acme.splunkcloud.com/services/collector
# - SPLUNK_INGEST_URL: The Splunk ingest URL, e.g. https://ingest.us0.observability.splunkcloud.com
# - SPLUNK_LISTEN_INTERFACE: The network interface the agent receivers listen on.

extensions:
  headers_setter:
    headers:
      - action: upsert
        key: X-SF-TOKEN
        from_context: X-SF-TOKEN
        default_value: "${SPLUNK_ACCESS_TOKEN}"

  health_check:
    endpoint: "${SPLUNK_LISTEN_INTERFACE}:13133"

  http_forwarder:
    ingress:
      endpoint: "${SPLUNK_LISTEN_INTERFACE}:6060"
    egress:
      # endpoint: "${SPLUNK_API_URL}"
      # Use instead when sending to gateway
      endpoint: "http://${SPLUNK_GATEWAY_URL}"
  
  http_forwarder/opamp_splunk_o11y:
    ingress:
      endpoint: "${SPLUNK_LISTEN_INTERFACE}:4320"
    egress:
      # endpoint: "${SPLUNK_INGEST_URL}"
      # Use instead when sending to gateway
      endpoint: "http://${SPLUNK_GATEWAY_URL}:4320"
  
  # opamp/splunk_o11y is included in the default config, but startup removes it
  # from service.extensions unless --feature-gates=+splunk.opamp.enabled is set.
  opamp/splunk_o11y:
    agent_description:
      # Include the Collector's resource attributes as OpAMP non-identifying attributes.
      include_resource_attributes: true
    server:
      http:
        # endpoint: "${SPLUNK_INGEST_URL}/v1/opamp"
        # Use instead when sending to gateway (assuming the gateway is running http_forwarder/signalfx on port 4320)
        endpoint: "http://${SPLUNK_GATEWAY_URL}:4320/v1/opamp"
        polling_interval: 30s
        headers:
          X-SF-Token: "${SPLUNK_ACCESS_TOKEN}"

  zpages:
    endpoint: "${SPLUNK_LISTEN_INTERFACE}:55679"
    expvar:
      enabled: true

receivers:
  fluent_forward:
    endpoint: "${SPLUNK_LISTEN_INTERFACE}:8006"
  host_metrics:
    collection_interval: 10s
    scrapers:
      cpu:
      disk:
      filesystem:
        exclude_mount_points:
          mount_points: [""] # exclude empty mount points
          match_type: strict
      memory:
      network:
      # System load average metrics https://en.wikipedia.org/wiki/Load_(computing)
      load:
      # Paging/Swap space utilization and I/O metrics
      paging:
      # Aggregated system process count metrics
      processes:
      # System processes metrics, disabled by default
      process:
        # mute_process_all_errors: true
        mute_process_name_error: true
        mute_process_user_error: true
        mute_process_exe_error: true
        include:
          names:
            - splunkd.exe
          match_type: strict
        metrics:
          process.cpu.utilization:
            enabled: true
          process.memory.utilization:
            enabled: true
          process.handles:
            enabled: true
          process.threads:
            enabled: true

  jaeger:
    protocols:
      grpc:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:14250"
      thrift_binary:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:6832"
      thrift_compact:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:6831"
      thrift_http:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:14268"

  otlp:
    protocols:
      grpc:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:4317"
        # Uncomment below config to preserve incoming access token and use it instead of the token value set in exporter config
        # include_metadata: true
      http:
        endpoint: "${SPLUNK_LISTEN_INTERFACE}:4318"
        # Uncomment below config to preserve incoming access token and use it instead of the token value set in exporter config
        # include_metadata: true

  # This section is used to collect the OpenTelemetry Collector metrics
  # Even if just a Splunk APM customer, these metrics are included
  prometheus/internal:
    config:
      scrape_configs:
      - job_name: 'otel-collector'
        scrape_interval: 10s
        static_configs:
        - targets: ["0.0.0.0:8888"]
        metric_relabel_configs:
          - source_labels: [ __name__ ]
            regex: 'promhttp_metric_handler_errors.*'
            action: drop
          - source_labels: [ __name__ ]
            regex: 'otelcol_processor_batch_.*'
            action: drop

  smartagent/processlist:
    type: processlist

  zipkin:
    endpoint: "${SPLUNK_LISTEN_INTERFACE}:9411"

  nop:

  # sqlserver:
  #   collection_interval: 10s
  #   username: ${env:SPLUNK_SQL_USER}
  #   password: ${SPLUNK_SQL_USER_PWD}
  #   server: localhost
  #   port: 1433
  #   resource_attributes:
  #     sqlserver.instance.name:
  #       enabled: true

  sqlserver:
    collection_interval: 10s
    username: ${env:SPLUNK_SQL_USER}
    password: ${env:SPLUNK_SQL_USER_PWD}
    server: localhost
    port: 1433
    resource_attributes:
      sqlserver.computer.name:
        enabled: true
      sqlserver.instance.name:
        enabled: true
    events:
      db.server.query_sample:
        enabled: true
      db.server.top_query:
        enabled: true

  windowsperfcounters/memory:
    metrics:
      bytes.committed:
        description: Number of bytes committed to memory
        unit: By
        gauge:
    collection_interval: 10s
    perfcounters:
      - object: Memory
        counters:
          - name: Committed Bytes
            metric: bytes.committed

  windowsperfcounters/processor:
    collection_interval: 5s
    metrics:
      processor.time:
        description: CPU active and idle time
        unit: "%"
        gauge:
    perfcounters:
      - object: "Processor"
        instances: "*"
        counters:
          - name: "% Processor Time"
            metric: processor.time
            attributes:
              state: active
      - object: "Processor"
        instances: ["0", "1", "2", "3"]
        counters:
          - name: "% Idle Time"
            metric: processor.time
            attributes:
              state: idle

  # Replaces smartagent/procstat (removed in 0.154.0). Uses PDH Process counters
  # so sqlservr metrics work without elevated process-handle access.
  windowsperfcounters/sqlservr:
    collection_interval: 10s
    metrics:
      sqlserver.process.cpu.utilization:
        description: CPU utilization for the sqlservr process
        unit: "%"
        gauge:
      sqlserver.process.memory.working_set:
        description: Working set memory for the sqlservr process
        unit: By
        gauge:
      sqlserver.process.threads:
        description: Thread count for the sqlservr process
        unit: "{threads}"
        gauge:
      sqlserver.process.handles:
        description: Handle count for the sqlservr process
        unit: "{handles}"
        gauge:
    perfcounters:
      - object: "Process"
        instances: ["sqlservr"]
        counters:
          - name: "% Processor Time"
            metric: sqlserver.process.cpu.utilization
          - name: "Working Set"
            metric: sqlserver.process.memory.working_set
          - name: "Thread Count"
            metric: sqlserver.process.threads
          - name: "Handle Count"
            metric: sqlserver.process.handles

  windows_service:
    collection_interval: 1m
    include_services:
      - MSSQLSERVER
      - SQLSERVERAGENT

  ntp:
    endpoint: pool.ntp.org:123
    collection_interval: 1h
    initial_delay: 5m

processors:
  batch:
    metadata_keys:
      - X-SF-Token

  # Enabling the memory_limiter is strongly recommended for every pipeline.
  # Configuration is based on the amount of memory allocated to the collector.
  # For more information about memory limiter, see
  # https://github.com/open-telemetry/opentelemetry-collector/blob/main/processor/memorylimiter/README.md
  memory_limiter:
    check_interval: 2s
    limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}

  # Detect if the collector is running on a cloud system, which is important for creating unique cloud provider dimensions.
  # Detector order is important: the `system` detector goes last so it can't preclude cloud detectors from setting host/os info.
  # Resource detection processor is configured to override all host and cloud attributes because instrumentation
  # libraries can send wrong values from container environments.
  # https://docs.splunk.com/Observability/gdi/opentelemetry/components/resourcedetection-processor.html#ordering-considerations
  resourcedetection:
    # detectors: [gcp, ecs, ec2, azure, system]
    detectors: [system]
    override: true

  # Optional: The following processor can be used to add a default "deployment.environment" attribute to the logs and
  # traces when it's not populated by instrumentation libraries.
  # If enabled, make sure to enable this processor in a pipeline.
  # For more information, see https://docs.splunk.com/Observability/gdi/opentelemetry/components/resource-processor.html
  #resource/add_environment:
    #attributes:
      #- action: insert
        #value: staging/production/...
        #key: deployment.environment

exporters:
  # Traces
  otlp_http:
    traces_endpoint: "${SPLUNK_INGEST_URL}/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"
    auth:
      authenticator: headers_setter

  # Metrics + Events
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    # api_url: "${SPLUNK_API_URL}"
    # ingest_url: "${SPLUNK_INGEST_URL}"
    # Use instead when sending to gateway
    api_url: http://${SPLUNK_GATEWAY_URL}:6060
    ingest_url: http://${SPLUNK_GATEWAY_URL}:9943
    sync_host_metadata: true
    correlation:

  # Entities (applicable only if discovery mode is enabled)
  otlp_http/entities:
    logs_endpoint: "${SPLUNK_INGEST_URL}/v3/event"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"
    auth:
      authenticator: headers_setter
  
  # Logs
  splunk_hec:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}"
    source: "otel"
    sourcetype: "otel"
    profiling_data_enabled: false
  
  # Profiling
  splunk_hec/profiling:
    token: "${SPLUNK_ACCESS_TOKEN}"
    endpoint: "${SPLUNK_INGEST_URL}/v1/log"
    log_data_enabled: false
  
  # Send to gateway
  otlp_grpc/gateway:
    endpoint: "${SPLUNK_GATEWAY_URL}:4317"
    tls:
      insecure: true
    auth:
      authenticator: headers_setter
  
  # Debug
  debug:
    verbosity: detailed

service:
  telemetry:
    logs:
      level: ${env:SPLUNK_COLLECTOR_LOG_LEVEL:-info}
      output_paths:
        - "${env:SPLUNK_HOME}/var/log/splunk/otel.log"
    # Resource attributes attached to the Collector's internal telemetry. These
    # are also exposed via OpAMP when the opamp/splunk_o11y extension is enabled
    # with agent_description.include_resource_attributes set to true.
    resource:
      attributes:
        - name: otelcol.service.mode
          value: agent
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '127.0.0.1'
                port: 8888
  
  extensions: 
  - headers_setter
  - health_check
  - http_forwarder
  - http_forwarder/opamp_splunk_o11y
  - opamp/splunk_o11y
  - zpages

  pipelines:
    traces:
      receivers:
      - jaeger
      - otlp
      - zipkin

      processors:
      - memory_limiter
      - batch
      - resourcedetection
      #- resource/add_environment

      # exporters:
      # - otlp_http
      # - signalfx
      # Use instead when sending to gateway
      exporters:
      - otlp_grpc/gateway

    metrics:
      receivers:
      - host_metrics
      - otlp
      - sqlserver
      - windowsperfcounters/memory
      - windowsperfcounters/processor
      - windowsperfcounters/sqlservr
      - windows_service
      - ntp

      processors:
      - memory_limiter
      - batch
      - resourcedetection

      # exporters:
      # - signalfx
      # Use instead when sending to gateway
      exporters:
      - otlp_grpc/gateway

    metrics/internal:
      receivers:
      - prometheus/internal

      processors:
      - memory_limiter
      - batch
      - resourcedetection

      # When sending to gateway, at least one metrics pipeline needs
      # to use signalfx exporter so host metadata gets emitted
      exporters:
      - signalfx

    logs/signalfx:
      receivers:
      - smartagent/processlist

      processors:
      - memory_limiter
      - batch
      - resourcedetection

      exporters:
      - signalfx

    logs/entities:
      # Receivers are dynamically added if discovery mode is enabled
      receivers:
      - nop

      processors:
      - memory_limiter
      - batch
      - resourcedetection

      # exporters:
      # - otlp_http/entities
      # Use instead when sending to gateway
      exporters:
      - otlp_grpc/gateway

    logs:
      receivers:
      - fluent_forward
      - otlp

      processors:
      - memory_limiter
      - batch
      - resourcedetection
      #- resource/add_environment

      # exporters:
      # - splunk_hec
      # - splunk_hec/profiling
      # Use instead when sending to gateway
      exporters:
      - otlp_grpc/gateway
